<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>1.6 Years | Our Sweet Scrapbook 💖</title>
    <link href="https://fonts.googleapis.com/css2?family=Mali:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --sweet-pink: #ffe5ec;
            --pink-accent: #ffb3c6;
            --rose-gold: #ff85a1;
            --paper-white: #fffdfa;
            --text-color: #4a3b32;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--sweet-pink);
            background-image: radial-gradient(#ffcad4 1.5px, transparent 1.5px);
            background-size: 24px 24px;
            font-family: 'Mali', cursive;
            color: var(--text-color);
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            height: 100vh; overflow: hidden;
            user-select: none;
        }

        /* --- กรอบสมุดเปิดกาง (Scrapbook Display) --- */
        .notebook-container {
            position: relative;
            width: 95vw; max-width: 900px;
            height: 70vh; max-height: 580px;
            background: var(--paper-white);
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(255, 133, 161, 0.25), 
                        inset 0 0 0 8px rgba(255, 255, 255, 0.5);
            border: 3px solid #fff;
            display: flex;
            overflow: hidden;
        }

        /* สันห่วงตรงกลางสมุด เพื่อความสมจริง */
        .notebook-container::after {
            content: "";
            position: absolute; top: 0; left: 50%; transform: translateX(-50%);
            width: 30px; height: 100%;
            background: linear-gradient(to right, rgba(0,0,0,0.05), rgba(0,0,0,0.1) 30%, transparent 50%, rgba(0,0,0,0.1) 70%, rgba(0,0,0,0.05));
            z-index: 10; pointer-events: none;
        }

        /* --- ระบบ Slider ลื่นๆ ขับด้วย GPU --- */
        .slider-track {
            display: flex;
            width: 100%; height: 100%;
            transition: transform 0.6s cubic-bezier(0.25, 1, 0.5, 1);
            will-change: transform;
        }

        .spread {
            min-width: 100%; height: 100%;
            display: flex;
            position: relative;
        }

        /* แบ่งหน้าซ้าย-ขวา */
        .page-left, .page-right {
            flex: 1; height: 100%;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            padding: 30px; position: relative;
            background-image: linear-gradient(rgba(0,0,0,0.02) 1px, transparent 1px);
            background-size: 100% 25px;
        }

        .page-left { border-right: 1px solid rgba(0,0,0,0.05); }

        /* หน้าปกแรกแบบหวานๆ */
        .cover-spread {
            background: linear-gradient(135deg, #ffe5ec 0%, #ffcad4 100%);
            justify-content: center; align-items: center; flex-direction: column;
            text-align: center;
        }
        .cover-title { font-size: 3.8rem; color: #fff; font-weight: 700; text-shadow: 3px 3px 0 var(--rose-gold); }
        .cover-tag { font-size: 1.3rem; margin-top: 15px; background: #fff; color: var(--rose-gold); padding: 5px 20px; border-radius: 20px; font-weight: bold; }

        /* --- กรอบโพลารอยด์เซ็ตหวาน --- */
        .polaroid {
            background: #fff;
            padding: 12px 12px 25px 12px;
            box-shadow: 0 10px 25px rgba(255, 182, 193, 0.4);
            border-radius: 4px;
            width: 85%; max-width: 280px;
            transform: rotate(calc(var(--r) * 1deg));
            transition: transform 0.3s;
            position: relative;
        }
        .polaroid:hover { transform: scale(1.05) rotate(0deg); }

        .img-box { width: 100%; aspect-ratio: 1/1; overflow: hidden; border-radius: 4px; background: #fff5f5; }
        .img-box img { width: 100%; height: 100%; object-fit: cover; }
        
        .caption { margin-top: 15px; font-size: 1.2rem; font-weight: bold; text-align: center; color: var(--text-color); }

        /* สก็อตเทปโบว์หวานๆ */
        .tape {
            position: absolute; top: -15px; left: 50%; transform: translateX(-50%) rotate(-2deg);
            width: 85px; height: 28px;
            background: rgba(255, 179, 198, 0.6);
            backdrop-filter: blur(1px);
            border-radius: 2px;
        }

        /* --- ปุ่มนำทาง แตะง่ายไม่วุ่นวาย --- */
        .nav-controls { display: flex; gap: 30px; margin-top: 25px; align-items: center; }
        
        .nav-btn {
            background: #fff; border: none;
            width: 50px; height: 50px; border-radius: 50%;
            box-shadow: 0 8px 15px rgba(255, 133, 161, 0.2);
            font-size: 1.2rem; cursor: pointer; display: flex;
            justify-content: center; align-items: center;
            transition: all 0.2s; color: var(--rose-gold);
        }
        .nav-btn:active { transform: scale(0.9); }
        .page-num { font-size: 1.1rem; font-weight: bold; color: var(--rose-gold); }

        /* ปุ่มคุมเพลงสไตล์มินิมอล */
        #music-btn {
            position: fixed; bottom: 20px; right: 20px;
            background: #fff; border: 2px solid var(--pink-accent);
            padding: 10px 20px; border-radius: 30px;
            font-family: inherit; font-weight: bold; cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            display: flex; align-items: center; gap: 8px; z-index: 100;
            color: var(--text-color);
        }

        /* รองรับหน้าจอมือถือแนวตั้งให้ซ้อนกันสวยๆ */
        @media (max-width: 600px) {
            .notebook-container { height: 75vh; }
            .spread { flex-direction: column; }
            .page-left, .page-right { padding: 15px; }
            .page-left { border-right: none; border-bottom: 1px solid rgba(0,0,0,0.05); }
            .notebook-container::after { display: none; }
            .polaroid { max-width: 200px; padding-bottom: 15px; }
            .cover-title { font-size: 2.5rem; }
        }
    </style>
</head>
<body>

    <div class="notebook-container">
        <div class="slider-track" id="track">
            
            <div class="spread cover-spread">
                <div class="cover-title">1.6 YEARS</div>
                <div class="cover-tag">Our Memories ✨</div>
                <p style="margin-top: 30px; font-weight: bold; color: white;">กดปุ่มด้านล่างเพื่อเปิดอ่านนะ</p>
            </div>

            <div id="dynamic-spreads" style="display: contents;"></div>

            <div class="spread cover-spread" style="background: linear-gradient(135deg, #ffcad4 0%, #ff85a1 100%);">
                <div class="cover-title" style="font-size: 3rem;">อยู่ด้วยกันไปนานๆ นะ ❤️</div>
            </div>

        </div>
    </div>

    <div class="nav-controls">
        <button class="nav-btn" onclick="moveSlide(-1)">◀</button>
        <div class="page-num" id="page-indicator">1 / 18</div>
        <button class="nav-btn" onclick="moveSlide(1)">▶</button>
    </div>

    <button id="music-btn" onclick="toggleMusic()">
        <span id="m-icon">🎵</span> <span id="m-text">PLAY MUSIC ▶</span>
    </button>
    <div id="yt-player" style="display: none;"></div>

    <script>
        const photos = [
            { src: '1.jpg', cap: '💖' }, { src: '2.jpg', cap: '😜' }, { src: '3.jpg', cap: 'เงาเท่ๆ 😎' },
            { src: '4.jpg', cap: '✨' }, { src: '5.jpg', cap: '👀' }, { src: '6.jpg', cap: '✌️' },
            { src: '7.jpg', cap: '🌻' }, { src: '8.jpg', cap: '😝' }, { src: '9.jpg', cap: '🫶' },
            { src: '10.jpg', cap: '🌊' }, { src: '11.jpg', cap: 'สดใสสุดๆ ☀️' }, { src: '12.jpg', cap: '🏖️' },
            { src: '13.jpg', cap: '🌟' }, { src: '14.jpg', cap: '📷' }, { src: '15.jpg', cap: '😋' },
            { src: '16.jpg', cap: '👟' }, { src: '17.jpg', cap: '🌱' }, { src: '18.jpg', cap: 'เดินเล่น 🚶‍♀️' },
            { src: '19.jpg', cap: '😆' }, { src: '20.jpg', cap: 'หมั่นเขี้ยว! 🤏' }, { src: '21.jpg', cap: '🍦' },
            { src: '22.jpg', cap: '🥰' },
            { src: '1592_0.jpg', cap: 'เจ้าตูบ 🐕' }, { src: '1593_0.jpg', cap: '🐾' },
            { src: '1603_0.jpg', cap: 'เผลอๆ 📸' }, { src: '1604_0.jpg', cap: 'ลมเย็นๆ 🌬️' },
            { src: 'LINE_ALBUM_with u_260601_1.jpg', cap: '🌸' }, { src: 'LINE_ALBUM_with u_260601_2.jpg', cap: '🥤' },
            { src: 'LINE_ALBUM_with u_260601_3.jpg', cap: '🌺' }, { src: 'LINE_ALBUM_with u_260601_4.jpg', cap: 'ธรรมชาติ 🌿' },
            { src: 'LINE_ALBUM_with u_260601_5.jpg', cap: '🌷' }, { src: 'LINE_ALBUM_with u_260601_6.jpg', cap: 'คูลๆ 😎' },
            { src: 'LINE_ALBUM_with u_260601_7.jpg', cap: 'ยิ้มหวาน 😊' }
        ];

        const container = document.getElementById('dynamic-spreads');
        for (let i = 0; i < photos.length; i += 2) {
            const leftData = photos[i];
            const rightData = photos[i+1];

            const rotL = (Math.random() * 6 - 3).toFixed(1);
            const rotR = (Math.random() * 6 - 3).toFixed(1);

            const spreadDiv = document.createElement('div');
            spreadDiv.className = 'spread';

            let leftHTML = `
                <div class="page-left">
                    <div class="polaroid" style="--r: ${rotL}">
                        <div class="tape"></div>
                        <div class="img-box"><img src="${leftData.src}" onerror="this.src='https://via.placeholder.com/400?text=กำลังโหลดรูป...'"></div>
                        <div class="caption">${leftData.cap}</div>
                    </div>
                </div>
            `;

            let rightHTML = '';
            if (rightData) {
                rightHTML = `
                    <div class="page-right">
                        <div class="polaroid" style="--r: ${rotR}">
                            <div class="tape"></div>
                            <div class="img-box"><img src="${rightData.src}" onerror="this.src='https://via.placeholder.com/400?text=กำลังโหลดรูป...'"></div>
                            <div class="caption">${rightData.cap}</div>
                        </div>
                    </div>
                `;
            } else {
                rightHTML = `
                    <div class="page-right">
                        <h3 style="color: var(--rose-gold)">Memories Card 🌸</h3>
                    </div>
                `;
            }

            spreadDiv.innerHTML = leftHTML + rightHTML;
            container.appendChild(spreadDiv);
        }

        let currentIdx = 0;
        const track = document.getElementById('track');
        const totalSlides = document.querySelectorAll('.spread').length;
        const indicator = document.getElementById('page-indicator');

        function moveSlide(direction) {
            currentIdx += direction;
            if (currentIdx < 0) currentIdx = 0;
            if (currentIdx >= totalSlides) currentIdx = totalSlides - 1;

            track.style.transform = `translate3d(-${currentIdx * 100}%, 0, 0)`;
            indicator.innerText = `${currentIdx + 1} / ${totalSlides}`;
        }

        let player;
        let isMusicPlaying = false;
        const mText = document.getElementById('m-text');
        const mIcon = document.getElementById('m-icon');

        const tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        const firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('yt-player', {
                height: '0', width: '0', videoId: 'yWfO_hE81WQ',
                playerVars: { 'autoplay': 0, 'loop': 1, 'playlist': 'yWfO_hE81WQ' },
                events: {
                    'onReady': () => { mText.innerText = "PLAY MUSIC ▶"; }
                }
            });
        }

        function toggleMusic() {
            if (!player || !player.getPlayerState) return;
            const state = player.getPlayerState();
            if (state === YT.PlayerState.PLAYING) {
                player.pauseVideo();
                isMusicPlaying = false;
                mText.innerText = "PLAY MUSIC ▶";
                mIcon.innerText = "🔇";
            } else {
                player.playVideo();
                isMusicPlaying = true;
                mText.innerText = "PAUSE MUSIC ⏸";
                mIcon.innerText = "🔊";
            }
        }
    </script>
</body>
</html>
