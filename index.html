<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Memories 💖</title>
    <style>
        /* --- ตั้งค่าโทนสีน่ารักๆ (พาสเทล) --- */
        :root {
            --bg-color: #fff0f5; /* สีพื้นหลังชมพูอ่อนละมุน */
            --text-main: #5d4037; /* สีตัวหนังสือโทนน้ำตาลอุ่นๆ */
            --text-light: #8d6e63;
            --accent-pink: #ffb6c1;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow-x: hidden;
        }

        /* --- หน้า Welcome น่ารักๆ ตอนเปิดเว็บ --- */
        #welcome-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 999;
            transition: opacity 1s ease-in-out;
            cursor: pointer;
        }

        .heart-icon {
            font-size: 3rem;
            animation: heartbeat 1.5s infinite;
            margin-bottom: 20px;
        }

        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); }
        }

        .typing-text {
            font-size: 1.5rem;
            min-height: 2.5rem;
            font-weight: bold;
            color: var(--text-main);
        }

        .tap-hint {
            margin-top: 20px;
            font-size: 0.9rem;
            color: var(--text-light);
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-10px); }
            60% { transform: translateY(-5px); }
        }

        /* --- เอฟเฟกต์หัวใจลอยขึ้นตอนกดหน้าจอ --- */
        .floating-heart {
            position: absolute;
            font-size: 1.5rem;
            pointer-events: none;
            animation: floatUp 1.5s ease-out forwards;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-100px) scale(1.5); opacity: 0; }
        }

        /* --- หน้า Gallery โพลารอยด์ --- */
        #main-content {
            opacity: 0;
            visibility: hidden;
            transition: opacity 1.5s ease-in-out;
            padding: 50px 20px;
            max-width: 900px;
            margin: 0 auto;
        }

        .header-section {
            text-align: center;
            margin-bottom: 50px;
        }

        .header-section h1 {
            font-size: 2.2rem;
            margin: 0 0 10px 0;
            color: var(--text-main);
        }

        .header-section p {
            font-size: 1rem;
            color: var(--text-light);
            margin: 0;
        }

        .photo-gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 30px;
        }

        /* สไตล์กรอบรูปโพลารอยด์ */
        .polaroid-card {
            background-color: white;
            padding: 15px 15px 40px 15px;
            border-radius: 4px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            transform: translateY(30px) rotate(calc(var(--rot) * 1deg));
            opacity: 0;
            transition: all 0.6s cubic-bezier(0.25, 1, 0.5, 1);
            position: relative;
        }

        .polaroid-card.reveal {
            transform: translateY(0) rotate(calc(var(--rot) * 1deg));
            opacity: 1;
        }

        .polaroid-card:hover {
            transform: translateY(-10px) rotate(0deg) scale(1.05);
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            z-index: 10;
        }

        .img-wrapper {
            width: 100%;
            aspect-ratio: 1/1; /* ทำรูปให้เป็นสี่เหลี่ยมจัตุรัสแบบไอจี */
            overflow: hidden;
            background-color: #f8f8f8;
        }

        .polaroid-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .polaroid-card:hover img {
            transform: scale(1.05);
        }

        .card-caption {
            position: absolute;
            bottom: 12px;
            left: 0;
            width: 100%;
            text-align: center;
            font-size: 1rem;
            color: var(--text-main);
            font-weight: 500;
        }

    </style>
</head>
<body>

    <audio id="vibe-music" loop>
        <source src="your-song.mp3" type="audio/mpeg">
    </audio>

    <div id="welcome-screen" onclick="startLove()">
        <div class="heart-icon">💖</div>
        <div class="typing-text" id="typewriter"></div>
        <div class="tap-hint">แตะหน้าจอเพื่อเปิดดูความทรงจำ 🐾</div>
    </div>

    <main id="main-content">
        <div class="header-section">
            <h1>Happy Anniversary ✨</h1>
            <p>รวมความน่ารักของเราไว้ตรงนี้หมดแล้ว</p>
        </div>

        <div class="photo-gallery">
            <div class="polaroid-card" style="--rot: -2;">
                <div class="img-wrapper">
                    <img src="https://images.unsplash.com/photo-1511895426328-dc8714191300?q=80&w=600&auto=format&fit=crop" alt="Memory">
                </div>
                <div class="card-caption">ไปกินหม่าล่าด้วยกัน 🥢</div>
            </div>

            <div class="polaroid-card" style="--rot: 3;">
                <div class="img-wrapper">
                    <img src="https://images.unsplash.com/photo-1492691527719-9d1e07e534b4?q=80&w=600&auto=format&fit=crop" alt="Memory">
                </div>
                <div class="card-caption">วุ่นวายกับเจ้าส้ม 🐈</div>
            </div>

            <div class="polaroid-card" style="--rot: -1;">
                <div class="img-wrapper">
                    <img src="https://images.unsplash.com/photo-1518182170546-076616fd4775?q=80&w=600&auto=format&fit=crop" alt="Memory">
                </div>
                <div class="card-caption">รอยยิ้มแบบนี้แหละที่ชอบ 🌸</div>
            </div>

            <div class="polaroid-card" style="--rot: 2;">
                <div class="img-wrapper">
                    <img src="https://images.unsplash.com/photo-1557180295-76faa20b6f16?q=80&w=600&auto=format&fit=crop" alt="Memory">
                </div>
                <div class="card-caption">อยู่ด้วยกันไปนานๆ นะ 💖</div>
            </div>
        </div>
    </main>

    <script>
        const text = "To my favorite person...";
        let i = 0;
        let isOpened = false;

        // เอฟเฟกต์พิมพ์ดีดข้อความน่ารักๆ
        function typeWriter() {
            if (i < text.length) {
                document.getElementById("typewriter").innerHTML += text.charAt(i);
                i++;
                setTimeout(typeWriter, 100);
            }
        }

        window.onload = () => {
            setTimeout(typeWriter, 500);
        };

        // สร้างหัวใจลอยตอนคลิกหน้าจอ
        function createFloatingHeart(e) {
            const heart = document.createElement('div');
            heart.classList.add('floating-heart');
            heart.innerHTML = ['💖', '🌸', '✨', '🐾'][Math.floor(Math.random() * 4)];
            heart.style.left = `${e.clientX - 15}px`;
            heart.style.top = `${e.clientY - 15}px`;
            document.body.appendChild(heart);

            setTimeout(() => {
                heart.remove();
            }, 1500);
        }

        // กดเพื่อเข้าสู่หน้าแกลเลอรี
        function startLove(event) {
            if(event) createFloatingHeart(event);
            
            if (isOpened) return;
            isOpened = true;

            // เล่นเพลง
            const audio = document.getElementById('vibe-music');
            audio.play().catch(e => console.log("Audio skipped"));

            const welcomeScreen = document.getElementById('welcome-screen');
            welcomeScreen.style.opacity = '0';

            setTimeout(() => {
                welcomeScreen.style.display = 'none';
                
                const mainContent = document.getElementById('main-content');
                mainContent.style.visibility = 'visible';
                mainContent.style.opacity = '1';

                // โชว์รูปโพลารอยด์ทีละใบ
                const cards = document.querySelectorAll('.polaroid-card');
                cards.forEach((card, index) => {
                    setTimeout(() => {
                        card.classList.add('reveal');
                    }, index * 250); 
                });
                
                // คลิกที่ไหนบนจอก็ให้มีหัวใจลอยขึ้นมา
                document.body.addEventListener('click', createFloatingHeart);

            }, 1000);
        }
    </script>
</body>
</html>
