<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>1.5 Years | Premium Album</title>
    <link href="https://fonts.googleapis.com/css2?family=Mali:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #121212;
            --cover-bg: #1a1a1a;
            --paper-bg: #f4f1ea;
            --text-dark: #2c3e50;
            --accent-color: #f1c40f;
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at 50% 50%, #2a2a2a 0%, #121212 100%);
            display: flex; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden;
            font-family: 'Mali', cursive;
            user-select: none;
        }

        /* --- โครงสร้างหนังสือ --- */
        .scene {
            width: 90vw; max-width: 450px;
            height: 80vh; max-height: 600px;
            perspective: 2000px;
            position: relative;
            /* อนิเมชันเลื่อนสมุดให้อยู่ตรงกลางตอนกางออก */
            transition: transform 0.8s cubic-bezier(0.645, 0.045, 0.355, 1);
        }

        .scene.is-open {
            transform: translateX(50%);
        }

        /* สำหรับมือถือแนวตั้ง ไม่ต้องเลื่อนเยอะ */
        @media (max-width: 768px) {
            .scene.is-open { transform: translateX(20%); }
        }

        .book {
            position: relative; width: 100%; height: 100%;
            transform-style: preserve-3d;
        }

        /* --- หน้ากระดาษ --- */
        .page {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            transform-origin: left center;
            transition: transform 0.8s cubic-bezier(0.645, 0.045, 0.355, 1);
            transform-style: preserve-3d;
            cursor: pointer;
            border-radius: 4px 12px 12px 4px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .page.flipped {
            transform: rotateY(-180deg);
        }

        /* ด้านหน้าและด้านหลังของแต่ละแผ่น */
        .front, .back {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            backface-visibility: hidden;
            border-radius: 4px 12px 12px 4px;
            overflow: hidden;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
        }

        .back {
            transform: rotateY(180deg);
            border-radius: 12px 4px 4px 12px;
        }

        /* --- ดีไซน์ปกและกระดาษ --- */
        .cover {
            background-color: var(--cover-bg);
            border: 1px solid #333;
            color: white;
            box-shadow: inset 8px 0 20px rgba(0,0,0,0.8);
        }
        
        .paper {
            background-color: var(--paper-bg);
            background-image: url('https://www.transparenttextures.com/patterns/cream-paper.png');
            color: var(--text-dark);
            box-shadow: inset 5px 0 15px rgba(0,0,0,0.1);
        }
        
        .back.paper { box-shadow: inset -5px 0 15px rgba(0,0,0,0.1); }

        /* --- เนื้อหาหน้าปก --- */
        .cover-content {
            border: 2px solid rgba(255,255,255,0.1);
            padding: 40px 20px; text-align: center;
            width: 80%; border-radius: 8px;
        }
        .cover-title { font-size: 3.5rem; font-weight: 700; margin: 0; letter-spacing: 2px; }
        .cover-subtitle { font-size: 1.2rem; color: #aaa; margin-top: 10px; }
        .hint { margin-top: 40px; font-size: 0.9rem; color: var(--accent-color); animation: blink 1.5s infinite; }

        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        /* --- เนื้อหารูปภาพ --- */
        .photo-container {
            width: 85%; background: white;
            padding: 15px 15px 30px 15px;
            box-shadow: 2px 5px 15px rgba(0,0,0,0.15);
            border-radius: 2px;
            transition: transform 0.3s;
        }
        .photo-container:hover { transform: scale(1.03); }
        .photo-img { width: 100%; aspect-ratio: 1/1; object-fit: cover; border: 1px solid #eee; }
        .photo-cap { margin-top: 15px; font-size: 1.2rem; font-weight: bold; text-align: center; }

        /* --- ปุ่มเพลง --- */
        .music-btn {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: rgba(30, 30, 30, 0.8); backdrop-filter: blur(5px);
            border: 1px solid rgba(255,255,255,0.2); color: white;
            padding: 12px 30px; border-radius: 50px;
            font-family: inherit; font-size: 1rem; cursor: pointer;
            display: flex; align-items: center; gap: 10px; z-index: 9999;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            transition: all 0.3s ease;
        }
        .music-btn:hover { background: rgba(50, 50, 50, 0.9); }
    </style>
</head>
<body>

    <div class="scene" id="scene">
        <div class="book" id="book">
            </div>
    </div>

    <button class="music-btn" onclick="toggleMusic()">
        <span id="music-icon">🎵</span> <span id="music-text">โหลดเพลง...</span>
    </button>
    <div id="yt-player" style="display: none;"></div>

    <script>
        // 1. ฐานข้อมูลรูปภาพ
        const photos = [
            { src: '1.jpg', cap: '💖' }, { src: '2.jpg', cap: '😜' }, { src: '3.jpg', cap: 'เงาเท่ๆ 😎' },
            { src: '4.jpg', cap: '✨' }, { src: '5.jpg', cap: '👀' }, { src: '6.jpg', cap: '✌️' },
            { src: '7.jpg', cap: '🌻' }, { src: '8.jpg', cap: '😝' }, { src: '9.jpg', cap: '🫶' },
            { src: '10.jpg', cap: '🌊' }, { src: '11.jpg', cap: 'สดใสสุดๆ ☀️' }, { src: '12.jpg', cap: '🏖️' },
            { src: '13.jpg', cap: '🌟' }, { src: '14.jpg', cap: '📷' }, { src: '15.jpg', cap: '😋' },
            { src: '16.jpg', cap: '👟' }, { src: '17.jpg', cap: '🌱' }, { src: '18.jpg', cap: 'เดินเล่น 🚶‍♀️' },
            { src: '19.jpg', cap: '😆' }, { src: '20.jpg', cap: 'หมั่นเขี้ยว! 🤏' }, { src: '21.jpg', cap: '🍦' },
            { src: '22.jpg', cap: '🥰' },
            { src: '1592_0.jpg', cap: 'เจ้าตูบ 🐕' }, { src: '1593_0.jpg', cap: '🐾' },
            { src: '1603_0.jpg', cap: 'เผลอๆ 📸' }, { src: '1604_0.jpg', cap: 'ลมเย็นๆ 🌬️' },
            { src: 'LINE_ALBUM_with u_260601_1.jpg', cap: '🌸' }, { src: 'LINE_ALBUM_with u_260601_2.jpg', cap: '🥤' },
            { src: 'LINE_ALBUM_with u_260601_3.jpg', cap: '🌺' }, { src: 'LINE_ALBUM_with u_260601_4.jpg', cap: 'ธรรมชาติ 🌿' },
            { src: 'LINE_ALBUM_with u_260601_5.jpg', cap: '🌷' }, { src: 'LINE_ALBUM_with u_260601_6.jpg', cap: 'คูลๆ 😎' },
            { src: 'LINE_ALBUM_with u_260601_7.jpg', cap: 'ยิ้มหวาน 😊' }
        ];

        // 2. ฟังก์ชันสร้าง HTML สำหรับกระดาษ
        function createPhotoHTML(photoData) {
            if(!photoData) return `<div class="photo-cap">The End 🖤</div>`;
            return `
                <div class="photo-container">
                    <img class="photo-img" src="${photoData.src}" alt="Memory" onerror="this.src='https://via.placeholder.com/400x400?text=Image+Not+Found'">
                    <div class="photo-cap">${photoData.cap}</div>
                </div>
            `;
        }

        const pagesData = [];
        
        // แผ่นแรก: ปกหน้า (หน้า) และ ปกใน (หลัง)
        pagesData.push({
            frontClass: 'cover', backClass: 'paper',
            front: `
                <div class="cover-content">
                    <h1 class="cover-title">1.5 YRS</h1>
                    <div class="cover-subtitle">Our Memories</div>
                    <div class="hint">คลิกขวาเพื่อเปิด 👉</div>
                </div>
            `,
            back: `<h2 style="color:#2c3e50; text-align:center;">จุดเริ่มต้นของความทรงจำ 🌻</h2>`
        });

        // แผ่นเนื้อหา: จับคู่รูปใส่หน้า-หลัง
        for(let i = 0; i < photos.length; i += 2) {
            pagesData.push({
                frontClass: 'paper', backClass: 'paper',
                front: createPhotoHTML(photos[i]),
                back: createPhotoHTML(photos[i+1])
            });
        }

        // แผ่นสุดท้าย: ปกหลังใน (หน้า) และ ปกหลัง (หลัง)
        pagesData.push({
            frontClass: 'paper', backClass: 'cover',
            front: `<h2 style="color:#2c3e50; text-align:center;">รักนะ 💖</h2>`,
            back: `<h2 style="color:white; opacity: 0.5;">THE END.</h2>`
        });

        // 3. เรนเดอร์ลงจอ และจัด Z-index ให้ซ้อนกันถูกหลักฟิสิกส์
        const bookDOM = document.getElementById('book');
        const scene = document.getElementById('scene');
        let totalPages = pagesData.length;

        pagesData.forEach((data, index) => {
            const pageDiv = document.createElement('div');
            pageDiv.className = 'page';
            pageDiv.style.zIndex = totalPages - index; // หน้าแรกอยู่บนสุด
            pageDiv.dataset.pageIndex = index;

            pageDiv.innerHTML = `
                <div class="front ${data.frontClass}">${data.front}</div>
                <div class="back ${data.backClass}">${data.back}</div>
            `;

            // ระบบคลิกเพื่อพลิก
            pageDiv.addEventListener('click', function(e) {
                // เช็คว่าคลิกฝั่งซ้ายหรือขวาของหนังสือ
                const rect = this.getBoundingClientRect();
                const clickX = e.clientX - rect.left;
                const halfWidth = rect.width / 2;

                if (this.classList.contains('flipped')) {
                    // ถ้าพลิกไปแล้ว (อยู่ฝั่งซ้าย) -> คลิกเพื่อปิดกลับมาขวา
                    this.classList.remove('flipped');
                    this.style.zIndex = totalPages - index;
                    
                    // ถ้าแผ่นแรกถูกปิด ให้เลื่อนสมุดกลับไปตรงกลาง
                    if(index === 0) scene.classList.remove('is-open');
                } else {
                    // ถ้ายังไม่พลิก (อยู่ฝั่งขวา) -> คลิกเพื่อเปิดไปซ้าย
                    this.classList.add('flipped');
                    this.style.zIndex = index + 1;

                    // ถ้าแผ่นแรกถูกเปิด ให้เลื่อนสมุดไปทางขวาเพื่อให้เซ็นเตอร์สมมาตร
                    if(index === 0) scene.classList.add('is-open');

                    // เล่นเพลงอัตโนมัติเมื่อกางปก
                    if(index === 0 && !isMusicPlaying) toggleMusic();
                }
            });

            bookDOM.appendChild(pageDiv);
        });

        // 4. ระบบเพลง YouTube API แบบฝัง
        let player;
        let isMusicPlaying = false;
        const mIcon = document.getElementById('music-icon');
        const mText = document.getElementById('music-text');

        const tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        const firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('yt-player', {
                height: '0', width: '0', videoId: 'yWfO_hE81WQ',
                playerVars: { 'autoplay': 0, 'loop': 1, 'playlist': 'yWfO_hE81WQ' },
                events: {
                    'onReady': () => { mText.innerText = "PLAY MUSIC ▶"; }
                }
            });
        }

        function toggleMusic() {
            if (!player || !player.getPlayerState) return;
            const state = player.getPlayerState();
            if (state === YT.PlayerState.PLAYING) {
                player.pauseVideo();
                isMusicPlaying = false;
                mText.innerText = "PLAY MUSIC ▶";
                mIcon.innerText = "🔇";
            } else {
                player.playVideo();
                isMusicPlaying = true;
                mText.innerText = "PAUSE MUSIC ⏸";
                mIcon.innerText = "🔊";
            }
        }
    </script>
</body>
</html>
