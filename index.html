<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1.5 Years | Just with you 🌻</title>
    <link href="https://fonts.googleapis.com/css2?family=Mali:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f7f9f9;
            --text-color: #2c3e50;
            --accent-yellow: #f1c40f;
            --accent-blue: #3498db;
            --accent-red: #ff6b6b;
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Mali', cursive;
            overflow-x: hidden;
            user-select: none;
        }

        #start-screen {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: var(--accent-yellow);
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 1000; cursor: pointer;
            transition: transform 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55), opacity 0.5s;
        }

        .bounce-emoji {
            font-size: 5rem;
            animation: bounce 0.8s infinite alternate;
        }

        @keyframes bounce {
            from { transform: translateY(0) scale(1); }
            to { transform: translateY(-20px) scale(1.1); }
        }

        .start-text {
            font-size: 1.5rem; margin-top: 20px; font-weight: 700;
            background: white; color: var(--text-color);
            padding: 12px 30px; border-radius: 50px;
            border: 3px solid var(--text-color);
            box-shadow: 5px 5px 0px var(--text-color);
            transition: all 0.1s;
        }

        .start-text:active {
            transform: translate(3px, 3px);
            box-shadow: 2px 2px 0px var(--text-color);
        }

        #main-gallery {
            display: none;
            padding: 60px 20px;
            max-width: 1200px; /* ขยายให้กว้างขึ้นเพื่อรองรับรูปเยอะๆ */
            margin: 0 auto;
            text-align: center;
            opacity: 0;
            animation: fadeIn 1s forwards 0.3s;
        }

        @keyframes fadeIn { to { opacity: 1; } }

        .gallery-header {
            font-size: 3rem; font-weight: 700;
            margin-bottom: 5px; position: relative;
            display: inline-block;
        }

        .gallery-header::after {
            content: ''; position: absolute;
            bottom: 8px; left: -5%; width: 110%; height: 20px;
            background-color: var(--accent-blue);
            z-index: -1; border-radius: 10px; transform: rotate(-1deg);
            opacity: 0.5;
        }

        .gallery-subtitle {
            font-size: 1.3rem; color: #555;
            margin-bottom: 60px; font-weight: 600;
        }

        .photo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 30px;
        }

        .photo-card {
            background: white; padding: 15px 15px 20px 15px;
            border-radius: 20px; border: 3px solid var(--text-color);
            box-shadow: 6px 6px 0px var(--text-color);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            opacity: 0; transform: translateY(40px);
            position: relative;
        }

        .photo-card.show {
            opacity: 1; transform: translateY(0);
        }

        .photo-card:hover {
            transform: translateY(-10px) rotate(3deg);
            z-index: 5;
        }
        
        .photo-card:nth-child(even):hover {
            transform: translateY(-10px) rotate(-3deg);
        }

        .tape {
            position: absolute; top: -15px; left: 50%;
            transform: translateX(-50%) rotate(-2deg);
            width: 80px; height: 30px;
            background-color: rgba(255, 107, 107, 0.6);
            z-index: 10;
        }
        
        .photo-card:nth-child(even) .tape {
            background-color: rgba(52, 152, 219, 0.6);
            transform: translateX(-50%) rotate(3deg);
        }
        
        .photo-card:nth-child(3n) .tape {
            background-color: rgba(241, 196, 15, 0.6); /* เพิ่มสก็อตเทปสีเหลืองใสให้ดูมีสีสันขึ้น */
        }

        .img-wrap {
            width: 100%; aspect-ratio: 1/1;
            overflow: hidden; border-radius: 12px;
            border: 2px solid var(--text-color);
            background-color: #eee; /* สีพื้นหลังเผื่อรูปโหลดไม่ทัน */
        }

        .img-wrap img {
            width: 100%; height: 100%; object-fit: cover;
        }

        .caption {
            margin-top: 15px; font-size: 1.1rem;
            font-weight: 700; color: var(--text-color);
        }

        #youtube-player { display: none; }
    </style>
</head>

    </main>

    <div id="youtube-player"></div>

    <script>
        let isStarted = false;

        function startVibe() {
            if (isStarted) return;
            isStarted = true;

            const ytContainer = document.getElementById('youtube-player');
            ytContainer.innerHTML = '<iframe width="0" height="0" src="https://www.youtube.com/embed/yWfO_hE81WQ?autoplay=1&loop=1&playlist=yWfO_hE81WQ" frameborder="0" allow="autoplay; encrypted-media"></iframe>';

            const startScreen = document.getElementById('start-screen');
            startScreen.style.transform = 'translateY(-100vh)';
            startScreen.style.opacity = '0';

            setTimeout(() => {
                startScreen.style.display = 'none';
                const gallery = document.getElementById('main-gallery');
                gallery.style.display = 'block';

                const cards = document.querySelectorAll('.photo-card');
                cards.forEach((card, index) => {
                    setTimeout(() => {
                        card.classList.add('show');
                    }, 300 + (index * 80)); /* ปรับความเร็วการเด้งโชว์ให้ไวขึ้นเพราะรูปเยอะ */
                });
            }, 700);
        }
    </script>
